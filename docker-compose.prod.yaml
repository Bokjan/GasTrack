# ============================================
# GasTrack 生产环境 Docker Compose
# ============================================
# 使用方式:
#   1. 复制 .env.production.example 为 .env.production 并填写配置
#   2. docker compose -f docker-compose.prod.yaml --env-file .env.production up -d
#
# HTTPS 首次部署:
#   1. 先填写 .env.production（DOMAIN / EMAIL）
#   2. chmod +x scripts/init-ssl.sh
#   3. DOMAIN=yourdomain.com EMAIL=you@email.com ./scripts/init-ssl.sh
# ============================================

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: gastrack-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-gastrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?请设置数据库密码}
      POSTGRES_DB: ${DB_NAME:-gastrack}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gastrack} -d ${DB_NAME:-gastrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gastrack-net
    # 不暴露到宿主机，仅供容器网络内部访问

  # ---------- Go 后端 ----------
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gastrack-backend
    restart: always
    environment:
      # Viper 环境变量覆盖（GASTRACK_ 前缀）
      GASTRACK_SERVER_HOST: "0.0.0.0"
      GASTRACK_SERVER_PORT: "8098"
      GASTRACK_SERVER_CORS_ORIGINS: ${CORS_ORIGINS:-https://yourdomain.com}
      GASTRACK_DATABASE_HOST: postgres
      GASTRACK_DATABASE_PORT: "5432"
      GASTRACK_DATABASE_USER: ${DB_USER:-gastrack}
      GASTRACK_DATABASE_PASSWORD: ${DB_PASSWORD:?请设置数据库密码}
      GASTRACK_DATABASE_DBNAME: ${DB_NAME:-gastrack}
      GASTRACK_DATABASE_SSLMODE: disable
      GASTRACK_JWT_SECRET: ${JWT_SECRET:?请设置JWT密钥}
      GASTRACK_LOG_LEVEL: ${LOG_LEVEL:-info}
      GASTRACK_LOG_FORMAT: json
      GASTRACK_LOG_FILE_PATH: /app/logs/gastrack.log
      GASTRACK_REGISTRATION_MODE: ${REGISTRATION_MODE:-invite_only}
    volumes:
      - backend-logs:/app/logs
      - backend-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gastrack-net
    # 不暴露到宿主机，仅供 Nginx 反代

  # ---------- Nginx (前端 + 反向代理 + HTTPS) ----------
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_DEFAULT_LOCALE: ${DEFAULT_LOCALE:-zh-CN}
    container_name: gastrack-nginx
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # SSL 证书（由 scripts/init-ssl.sh 或手动放置）
      - ./ssl:/etc/nginx/ssl:ro
      # Certbot ACME 验证目录
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gastrack-net

volumes:
  pgdata:
    driver: local
  backend-logs:
    driver: local
  backend-uploads:
    driver: local

networks:
  gastrack-net:
    driver: bridge
