server:
  host: 0.0.0.0
  port: 8098
  read_timeout: 15s
  write_timeout: 15s
  shutdown_timeout: 10s
  cors_origins:
    - http://localhost:3000
    - http://localhost:5173

database:
  host: localhost
  port: 5432
  user: gastrack
  password: gastrack
  dbname: gastrack
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 5

jwt:
  secret: change-me-in-production-use-a-random-32-byte-string
  access_expiration: 15m
  refresh_expiration: 168h  # 7 days
  issuer: gastrack

i18n:
  default_locale: en-US
  supported_locales:
    - en-US
    - zh-CN
    - ja-JP

upload:
  max_file_size: 5242880  # 5MB
  upload_dir: ./uploads

log:
  level: info   # debug/info/warn/error
  format: json  # json/console
